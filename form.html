<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <body>
   <div class="topbar">
    <div class="logo">
        <img src="logo.png" alt="Learnify Logo">
        <div class="text">
            <span>Learnify</span>
            <p class="tagline">Learn Smarter. Grow Faster 🚀</p>
        </div>
    </div>
</div>
    
   
    <div class="container">
        <div class="top">
        <h3><center><u>LOGIN</u></center></h3>
        </div>
    <form action="/submit" method="post">
        <div class="head">
            <div class="head-grp">
    <label for="username">Username/email:</label>
    <input type="text" id="username" name="username"  placeholder="Enter Your Username/Email" required>
        
            </div>
            <div class="head-grp">
            <label for="password">Password:</label>
    <input type="password" id="password" name="password"  placeholder="Enter Your Password" required>
        </div>
        <div class="head-grp">
            <label for="number">Mobile No:</label>
            <input type="tel" id="number", name="number", placeholder="Enter Your Number" required>
        </div>
    
        <div class="head-grp">
        <label>Gender:</label>
        <div class="radio-grp">
            <div class="circle">
    <input type="radio" id="male" name="gender" value="male" required>
    <label for="male">Male</label>
    </div>
    <div class="circle">
    <input type="radio" id="female" name="gender" value="female" required>
    <label for="female">Female</label>
    </div>
    
        </div>
        </div>
<div class="head-grp">
        <label for="dob">DOB:</label>
            <input type="date" id="dob", name="dob", placeholder="Enter Your DOB" required>
</div>

<div class="check">
<input type="checkbox" id="c", name="c" required>
<label for="c">I certify that I am at least 18 years of age so that I agree to the Terms and policies and Privacy Policies. This service is for the India Only.</label>
</div>
        
        </div>
        
        
            
        
        

        <div class="foot">
        
        <button type="submit">Submit</button>
    
    </form>
        </div>
        
            <div class="h2">
                Or
            </div>
        <div class="tail">
            Don't Have An Account? <a href="signup.html">Sign Up</a>

        </div>
        
   
    
</body>
</html>
