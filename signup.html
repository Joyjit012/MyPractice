<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="topbar">
        <div class="logo">
            <img src="logo.png" alt="Learnify Logo">
            <div class="text">
                <span>Learnify</span>
                <p class="tagline">Learn Smarter and Grow Faster 🚀</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="head">
            <h4>Signup</h4>
            <div class="head2">
                <h5>Welcome to Learnify-Let's Create an Account.</h5>
            </div>
        </div>
        <div class="line"></div>
        <form action="/submit" method="post">
            <div class="middle">
                <label for="user">Name:</label>
                <input type="text" name="user" id="user" placeholder=" Enter Your Name" required>

                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder=" Enter Your Email address" required>

                <label for="pass">Password:</label>
                <input type="password" name="pass" id="pass" placeholder=" Enter Your Password" required>

            </div>
            <div class="check">
                <input type="checkbox" id="c" , name="c" required>
                <label for="c">I agree to the <a href="privacy.html">Privacy&Policy</a>.</label>
            </div>
            <div class="foot">
                <button type="submit">Signup</button>
        </form>

        <p>
            Already have an account?
            <a href="form.html">Sign in</a>
        </p>
    </div>

    </div>
    <div class="right">

        <img src="Screenshot.png" alt="ss">
    </div>


</body>

</html>
